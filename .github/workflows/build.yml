name: Build KeystrokeCommander

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/KeystrokeCommander.csproj

      - name: Build
        run: dotnet build src/KeystrokeCommander.csproj --no-restore --configuration Release

      - name: Publish single-file EXE
        run: dotnet publish src/KeystrokeCommander.csproj -c Release -r win-x64 --self-contained false /p:PublishSingleFile=true --no-build

      - name: Copy EXE to release staging
        run: |
          mkdir _release
          copy src\bin\Release\net8.0-windows\win-x64\publish\KeystrokeCommander.exe _release\KeystrokeCommander.exe

      - name: Delete previous rolling release
        uses: dev-drprasad/delete-tag-and-release@v1.1
        if: always()
        with:
          tag_name: latest
          github_token: ${{ secrets.GITHUB_TOKEN }}
          delete_release: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Keystroke Commander (latest)"
          body: |
            **Download:** `KeystrokeCommander.exe`
            Requires .NET 8 Desktop Runtime.
          files: _release/KeystrokeCommander.exe
          draft: false
          prerelease: false
